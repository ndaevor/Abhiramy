<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invite</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat&family=Cormorant+Garamond:wght@300;500&display=swap" rel="stylesheet">

<style>
:root{
    --green:#1f3d2b;
    --gold:#c5a059;
    --light:#fdfaf5;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Montserrat;
    overflow:hidden;
    background:var(--light);
}

/* ---------- OPENING ---------- */
.envelope{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--light);
    z-index:1000;
    cursor:pointer;
    overflow:hidden;
}

/* glow effect */
.envelope::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:radial-gradient(circle, rgba(197,160,89,0.15), transparent 70%);
    animation:glowMove 6s linear infinite;
}

@keyframes glowMove{
    from{transform:translate(-30%, -30%);}
    to{transform:translate(0%, 0%);}
}

.card{
    text-align:center;
    animation:fadeUp 1.5s ease;
}

@keyframes fadeUp{
    from{opacity:0; transform:translateY(40px) scale(0.95);}
    to{opacity:1; transform:translateY(0) scale(1);}
}

.names{
    font-family:Playfair Display;
    color:var(--green);
    letter-spacing:2px;
}

.invite{
    font-family:Cormorant Garamond;
    font-size:1.2rem;
    letter-spacing:2px;
}

/* premium seal */
.seal{
    margin-top:25px;
    width:80px;
    height:80px;
    border-radius:50%;
    background:var(--green);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
    letter-spacing:2px;
    font-size:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    animation:pulse 2s infinite;
}

@keyframes pulse{
    50%{transform:scale(1.08);}
}

/* ---------- MAIN ---------- */
.main{
    height:100vh;
    overflow-y:auto;
    scroll-snap-type:y mandatory;
}

/* SECTION */
.section{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:20px;
    scroll-snap-align:start;
}

/* HERO */
.hero{
    background:url('anuchechi.jpeg') center/cover no-repeat;
    position:relative;
}

.hero::after{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.6);
}

.hero-content{
    position:relative;
    z-index:2;
    color:#fff;
}

h1{
    font-family:Playfair Display;
    font-size:clamp(2.5rem,8vw,4rem);
}

.sub{
    font-family:Cormorant Garamond;
    font-size:1.2rem;
    letter-spacing:2px;
}

/* ---------- PREMIUM CARD (NO BG IMAGE) ---------- */
.card-box{
    background:white;
    padding:40px 25px;
    border-radius:20px;
    box-shadow:0 20px 50px rgba(0,0,0,0.08);
    max-width:400px;
}

/* TITLE */
.title{
    font-family:Playfair Display;
    font-size:2rem;
    color:var(--green);
}

/* DIVIDER */
.divider{
    width:50px;
    height:2px;
    background:var(--gold);
    margin:15px auto 25px;
}

/* COUNTDOWN */
.countdown{
    display:flex;
    gap:12px;
    justify-content:center;
}

.box{
    padding:15px;
    border-radius:12px;
    background:#fafafa;
    min-width:70px;
}

.box span{
    display:block;
    font-size:22px;
    font-weight:bold;
    color:var(--gold);
}

.box small{
    font-size:10px;
    letter-spacing:1px;
}

/* DETAILS */
.detail{
    font-family:Cormorant Garamond;
    font-size:1.1rem;
    margin:10px 0;
    color:#444;
}

.quote{
    margin-top:20px;
    font-style:italic;
    font-size:14px;
    color:#777;
}

/* VENUE */
.btn{
    margin-top:20px;
    padding:10px 20px;
    background:var(--green);
    color:#fff;
    text-decoration:none;
}

/* ANIMATION */
.reveal{
    opacity:0;
    transform:translateY(40px);
    transition:1s;
}

.reveal.show{
    opacity:1;
    transform:translateY(0);
}

/* MOBILE */
@media(max-width:600px){
    .countdown{flex-wrap:wrap;}
}
</style>
</head>

<body>

<!-- OPEN -->
<div class="envelope" id="env" onclick="openCard()">
    <div class="card">
        <p class="invite">You are invited</p>
        <h2 class="names">Parthasarathy & Abhiramy</h2>
        <div class="seal">OPEN</div>
    </div>
</div>

<!-- MAIN -->
<div class="main">

<!-- HERO -->
<section class="section hero">
    <div class="hero-content">
        <p class="sub reveal">We are getting married</p>
        <h1 class="reveal">Parthasarathy & Abhiramy</h1>
        <p class="sub reveal">May 24, 2026</p>
    </div>
</section>

<!-- COUNTDOWN -->
<section class="section">
    <div class="card-box reveal">
        <h2 class="title">Counting Down</h2>
        <div class="divider"></div>

        <div class="countdown">
            <div class="box"><span id="d"></span><small>Days</small></div>
            <div class="box"><span id="h"></span><small>Hours</small></div>
            <div class="box"><span id="m"></span><small>Mins</small></div>
            <div class="box"><span id="s"></span><small>Secs</small></div>
        </div>
    </div>
</section>

<!-- DETAILS -->
<section class="section">
    <div class="card-box reveal">
        <h2 class="title">Wedding Details</h2>
        <div class="divider"></div>

        <p class="detail">📅 May 24, 2026</p>
        <p class="detail">🕛 Muhurtham: 12:00 PM – 12:26 PM</p>

        
    </div>
</section>

<!-- VENUE -->
<section class="section">
    <div class="card-box reveal">
        <h2 class="title">Venue</h2>
        <div class="divider"></div>

        <p class="detail"><b>SNDP Hall, Mamangalam</b></p>
        <p class="detail">Kochi, Kerala</p>

        <a class="btn" target="_blank"
        href="https://maps.app.goo.gl/kzu77k8YmkibRwcp6">
        View Location
        </a>
    </div>
</section>

</div>

<script>

// OPEN
function openCard(){
    const env=document.getElementById("env");

    env.style.transition="1s";
    env.style.opacity="0";
    env.style.transform="scale(1.1)";

    setTimeout(()=>{
        env.style.display="none";
        document.body.style.overflow="hidden";
    },1000);
}

// COUNTDOWN
let date = new Date("May 24, 2026 10:00:00").getTime();

setInterval(()=>{
    let now = new Date().getTime();
    let diff = date - now;

    document.getElementById("d").innerText = Math.floor(diff/(1000*60*60*24));
    document.getElementById("h").innerText = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
    document.getElementById("m").innerText = Math.floor((diff%(1000*60*60))/(1000*60));
    document.getElementById("s").innerText = Math.floor((diff%(1000*60))/1000);
},1000);

// SCROLL ANIMATION
const observer=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
        if(e.isIntersecting){
            e.target.classList.add("show");
        }
    });
});

document.querySelectorAll(".reveal").forEach(el=>observer.observe(el));

</script>

</body>
</html>
