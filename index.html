<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invite</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat&display=swap" rel="stylesheet">

<style>
:root{
    --green:#1f3d2b;
    --gold:#c5a059;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Montserrat;
    overflow:hidden;
}

/* ---------- OPEN ---------- */
.envelope{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#fdfaf5;
    z-index:1000;
    cursor:pointer;
}

.card{
    text-align:center;
    animation:fadeUp 1.5s ease;
}

@keyframes fadeUp{
    from{opacity:0; transform:translateY(40px);}
    to{opacity:1;}
}

.names{
    font-family:Playfair Display;
    color:var(--green);
}

.seal{
    margin-top:20px;
    width:70px;
    height:70px;
    border-radius:50%;
    background:var(--green);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    50%{transform:scale(1.1);}
}

/* ---------- MAIN ---------- */
.main{
    height:100vh;
    overflow-y:auto;
    scroll-snap-type:y mandatory;
}

/* SECTION */
.section{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:20px;
    scroll-snap-align:start;
    position:relative;
}

/* PARALLAX BG */
.parallax{
    background:url('anuchechi.jpeg') center/cover no-repeat;
}

.parallax::after{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.6);
}

.content{
    position:relative;
    z-index:2;
    color:#fff;
}

/* TEXT ANIMATION */
.reveal{
    opacity:0;
    transform:translateY(50px);
    transition:1s ease;
}

.reveal.show{
    opacity:1;
    transform:translateY(0);
}

/* HERO TEXT */
h1{
    font-family:Playfair Display;
    font-size:clamp(2.5rem,8vw,4.5rem);
}

/* COUNTDOWN */
.countdown{
    display:flex;
    gap:15px;
    margin-top:20px;
}

.box{
    background:#fff;
    padding:15px;
    color:#000;
}

.box span{
    color:var(--gold);
}

/* BUTTON */
.btn{
    margin-top:20px;
    padding:10px 20px;
    background:var(--green);
    color:#fff;
    text-decoration:none;
}

/* SCROLL INDICATOR */
.scroll-indicator{
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    color:#fff;
    font-size:12px;
    opacity:0.7;
    animation:scrollAnim 2s infinite;
}

@keyframes scrollAnim{
    0%{transform:translate(-50%,0);}
    50%{transform:translate(-50%,10px);}
    100%{transform:translate(-50%,0);}
}

/* PARTICLES */
.particle{
    position:absolute;
    width:6px;
    height:6px;
    background:var(--gold);
    border-radius:50%;
    opacity:0.6;
    animation:float 6s linear infinite;
}

@keyframes float{
    from{transform:translateY(100vh);}
    to{transform:translateY(-10vh);}
}

/* MOBILE */
@media(max-width:600px){
    .countdown{flex-wrap:wrap;}
}
</style>
</head>

<body>

<!-- OPEN -->
<div class="envelope" id="env" onclick="openCard()">
    <div class="card">
        <p>You are invited</p>
        <h2 class="names">Abhiramy & Parthasarathy</h2>
        <div class="seal">OPEN</div>
    </div>
</div>

<!-- MAIN -->
<div class="main" id="main">

    <!-- HERO -->
    <section class="section parallax">
        <div class="content">
            <p class="reveal">We are getting married</p>
            <h1 class="reveal">Abhiramy & Parthasarathy</h1>
            <p class="reveal">May 24, 2026</p>
        </div>
        <div class="scroll-indicator">Scroll ↓</div>
    </section>

    <!-- COUNTDOWN -->
    <section class="section">
        <div>
            <h2 class="reveal">Countdown</h2>
            <div class="countdown reveal">
                <div class="box"><span id="d"></span><br>Days</div>
                <div class="box"><span id="h"></span><br>Hours</div>
                <div class="box"><span id="m"></span><br>Mins</div>
                <div class="box"><span id="s"></span><br>Secs</div>
            </div>
        </div>
    </section>

    <!-- DETAILS -->
    <section class="section">
        <div class="reveal">
            <h2>Wedding Details</h2>
            <p>Date: May 24, 2026</p>
            <p>Muhurtham: 12:00 PM - 12:26 PM</p>
        </div>
    </section>

    <!-- VENUE -->
    <section class="section parallax">
        <div class="content reveal">
            <h2>Venue</h2>
            <p><b>SNDP Hall, Mamangalam</b></p>
            <p>Kochi, Kerala</p>
		<br>

            <a class="btn" target="_blank"
            href="https://maps.app.goo.gl/kzu77k8YmkibRwcp6">
            View Location
            </a>
        </div>
    </section>

</div>

<script>

// OPEN
function openCard(){
    document.getElementById("env").style.opacity="0";

    setTimeout(()=>{
        document.getElementById("env").style.display="none";
        document.body.style.overflow="hidden";
    },800);

    startParticles();
}

// COUNTDOWN
let date = new Date("May 24, 2026 10:00:00").getTime();

setInterval(()=>{
    let now = new Date().getTime();
    let diff = date - now;

    document.getElementById("d").innerText = Math.floor(diff/(1000*60*60*24));
    document.getElementById("h").innerText = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
    document.getElementById("m").innerText = Math.floor((diff%(1000*60*60))/(1000*60));
    document.getElementById("s").innerText = Math.floor((diff%(1000*60))/1000);
},1000);

// SCROLL REVEAL
const observer = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
        if(entry.isIntersecting){
            entry.target.classList.add("show");
        }
    });
});

document.querySelectorAll(".reveal").forEach(el=>{
    observer.observe(el);
});

// PARTICLES
function startParticles(){
    setInterval(()=>{
        let p=document.createElement("div");
        p.className="particle";
        p.style.left=Math.random()*100+"%";
        p.style.animationDuration=(4+Math.random()*4)+"s";
        document.body.appendChild(p);

        setTimeout(()=>p.remove(),8000);
    },300);
}

</script>

</body>
</html>
